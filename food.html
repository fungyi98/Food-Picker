<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Food Picker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      background-color: #fff8f0;
    }
    h1 {
      color: #ff6b6b;
    }
    button {
      background-color: #ff6b6b;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background-color: #ff3b3b;
    }
    #result {
      margin-top: 30px;
      font-size: 24px;
      font-weight: bold;
      color: #333;
    }
  </style>
</head>
<body>

<h1>🍽️ What Should I Eat?</h1>
<button onclick="getFood()">Pick Food</button>
<p id="result"></p>

<script>
  async function getFood() {
    const scriptUrl = "https://script.google.com/macros/s/AKfycbzv0cIdXr3LrtySBM3Jfw8tPQackyQ6fpWWUD_3vBz5yRvEcf1jUxMhbJfmOMd-Wcf8_Q/exec"; // Replace with your deployed Apps Script URL ending with /exec

    try {
      console.log("Button clicked, fetching food...");

      const response = await fetch(scriptUrl);
      console.log("Response received:", response);

      if (!response.ok) throw new Error("Network response was not OK");

      const data = await response.json();
      console.log("Data received:", data);

      if (data.food) {
        document.getElementById("result").innerText = data.food;
      } else {
        document.getElementById("result").innerText = "No food found!";
      }
    } catch (error) {
      console.error("Error fetching food:", error);
      document.getElementById("result").innerText = "Error fetching food. Check console.";
    }
  }
</script>

</body>
</html>
