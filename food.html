<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🎰 Food Gachapon</title>

<!-- Lexend Font -->
<link href="https://fonts.googleapis.com/css2?family=Lexend&display=swap" rel="stylesheet">

<style>
body { font-family: 'Lexend', sans-serif; text-align:center; margin:0; background:#fff; transition: background 0.5s; }
h1,h2,h3,h4 { margin:10px 0; }
button { padding:14px; margin:8px; border-radius:15px; border:none; font-size:16px; width:80%; max-width:300px; cursor:pointer; color:white; background:#ff8fab; }
input,select { padding:10px; margin:5px; border-radius:10px; width:80%; max-width:300px; }

.hidden { display:none; }

.picker-section, .contribution-section { margin: 10px auto; max-width: 400px; }
.food-list { border:1px solid #ccc; border-radius:10px; padding:10px; background:#f9f9f9; margin-top:10px; max-height:300px; overflow-y:auto; }

#spinner { width:300px; height:60px; margin:20px auto; border:2px solid #fbc02d; border-radius:15px; display:flex; overflow:hidden; justify-content:center; align-items:center; font-size:20px; font-weight:bold; background: #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

.bounce { animation:bounce 0.4s; }
@keyframes bounce { 0%{transform:scale(1);} 50%{transform:scale(1.2);} 100%{transform:scale(1);} }
</style>
</head>
<body>

<h1>🎀 Food Gachapon 🎀</h1>

<!-- User Picker -->
<div class="picker-section">
<h2>Who is choosing today?</h2>
<button onclick="chooseUserPicker('mandy')">Mandy</button>
<button onclick="chooseUserPicker('sean')">Sean</button>

<h3>Filter Options</h3>
<select id="filterType">
<option value="any">Any Type</option>
<option value="food">Food</option>
<option value="drink">Drink</option>
</select>

<select id="filterMeal">
<option value="any">Any Meal</option>
<option value="breakfast">Breakfast</option>
<option value="brunch">Brunch/Lunch</option>
<option value="dinner">Dinner</option>
<option value="dessert">Dessert</option>
</select>

<select id="filterBudget">
<option value="any">Any Budget</option>
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
</select>

<p id="availableCount">Available: 0</p>
<button onclick="spin()">🎰 SPIN</button>
<button onclick="refreshSpin()">🔄 Spin Again</button>

<!-- Spinner replaces machine -->
<div id="spinner">--</div>

<div id="result"></div>
</div>

<!-- Contribution -->
<div class="contribution-section">
<h2>Contribute Food/Drink</h2>
<button onclick="chooseUserContribution('mandy')">Mandy</button>
<button onclick="chooseUserContribution('sean')">Sean</button>

<div id="contributionApp" class="hidden">
<h3>➕ Add Food/Drink</h3>
<input id="name" placeholder="Food name">
<select id="type">
<option value="food">Food</option>
<option value="drink">Drink</option>
</select>
<select id="meal">
<option value="breakfast">Breakfast</option>
<option value="brunch">Brunch/Lunch</option>
<option value="dinner">Dinner</option>
<option value="dessert">Dessert</option>
</select>
<select id="budget">
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
</select>
<button onclick="addFood()">Add</button>
</div>

<h3>📋 Food List</h3>
<div id="list" class="food-list"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script>
// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// STATE
let currentUser = "";
let currentFoods = [];

// LOAD FOOD LIST ALWAYS
db.collection("foods").onSnapshot(snapshot=>{
  currentFoods = [];
  let html = "";
  snapshot.forEach(doc=>{
    let f = doc.data();
    currentFoods.push(f);
    html += `<div class="food-item">${f.name} (${f.type} | ${f.meal} | ${f.budget})</div>`;
  });
  document.getElementById("list").innerHTML = html;
  updateAvailableCount();
});

// USER SELECTION
function chooseUserPicker(user){
  currentUser = user;
  document.body.style.background = user==="mandy"?"#ffd6e0":"#d6ecff";
  updateAvailableCount();
}
function chooseUserContribution(user){
  currentUser = user;
  document.getElementById("contributionApp").classList.remove("hidden");
  document.body.style.background = user==="mandy"?"#ffd6e0":"#d6ecff";
}

// FILTER
function updateAvailableCount(){
  const typeFilter = document.getElementById("filterType").value;
  const mealFilter = document.getElementById("filterMeal").value;
  const budgetFilter = document.getElementById("filterBudget").value;

  const filtered = currentFoods.filter(f =>
    (currentUser===""||f.user===currentUser) &&
    (typeFilter==='any'||f.type===typeFilter) &&
    (mealFilter==='any'||f.meal===mealFilter) &&
    (budgetFilter==='any'||f.budget===budgetFilter)
  );
  document.getElementById("availableCount").innerText = "Available: "+filtered.length;
}
document.getElementById("filterType").addEventListener("change",updateAvailableCount);
document.getElementById("filterMeal").addEventListener("change",updateAvailableCount);
document.getElementById("filterBudget").addEventListener("change",updateAvailableCount);

// ADD FOOD
function addFood(){
  const nameInput = document.getElementById("name");
  if(!nameInput.value) return;
  db.collection("foods").add({
    user: currentUser,
    name: nameInput.value,
    type: document.getElementById("type").value,
    meal: document.getElementById("meal").value,
    budget: document.getElementById("budget").value
  });
  nameInput.value = "";
}

// SPIN (spinner instead of machine)
function spin(){
  const spinner = document.getElementById("spinner");
  const typeFilter = document.getElementById("filterType").value;
  const mealFilter = document.getElementById("filterMeal").value;
  const budgetFilter = document.getElementById("filterBudget").value;

  const filtered = currentFoods.filter(f =>
    f.user===currentUser &&
    (typeFilter==='any'||f.type===typeFilter) &&
    (mealFilter==='any'||f.meal===mealFilter) &&
    (budgetFilter==='any'||f.budget===budgetFilter)
  );

  if(filtered.length===0){
    spinner.innerText="--";
    document.getElementById("result").innerText="No food 😢";
    return;
  }

  let pick = filtered[Math.floor(Math.random()*filtered.length)];
  let i=0;
  let interval = setInterval(()=>{
    spinner.innerText = filtered[i].name;
    i=(i+1)%filtered.length;
  },100);

  setTimeout(()=>{
    clearInterval(interval);
    spinner.innerText = pick.name;
    const result=document.getElementById("result");
    result.innerText="🍽️ "+pick.name;
    result.classList.add("bounce");
    setTimeout(()=>result.classList.remove("bounce"),400);
  },1500);
}

function refreshSpin(){ spin(); }
</script>
</body>
</html>
